name: hanzi_app
description: "宝宝识字 - 帮助学前儿童学习汉字的趣味应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cs_core:
    path: ../cs/cs_core
  cs_auth:
    path: ../cs/cs_auth
  cs_ui:
    path: ../cs/cs_ui
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.4.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  go_router: ^14.0.0
  flutter_screenutil: ^5.9.0
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.0
  logger: ^2.4.0
  flutter_animate: ^4.5.2
  audioplayers: ^6.1.0
  lottie: ^3.1.3
  google_fonts: ^6.2.1
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/default_configs.json
